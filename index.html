<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vegas Royale Slot</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root { --gold:#ffd700; }
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:radial-gradient(circle at top,#300,#000);
  color:var(--gold);
  text-align:center;
}
header h1{
  margin:20px 0;
  font-size:2.5em;
  text-shadow:0 0 15px red;
}
.machine{
  max-width:420px;
  margin:auto;
  background:linear-gradient(145deg,#111,#000);
  border:4px solid var(--gold);
  border-radius:25px;
  box-shadow:0 0 40px gold;
  padding:20px;
}
.credits{font-size:1.2em;}
.reel-window{
  background:black;
  border:4px inset var(--gold);
  border-radius:15px;
  padding:15px;
  margin:20px 0;
}
.slots{display:flex;justify-content:center;}
.slot{
  background:#fff;
  width:90px;
  height:90px;
  margin:0 6px;
  border-radius:12px;
}
.slot img{
  width:100%;
  height:100%;
  object-fit:contain;
}
button,select,input{
  padding:10px;
  font-size:16px;
  border-radius:8px;
  border:none;
}
button{
  width:80%;
  margin-top:10px;
  background:linear-gradient(to bottom,#ffe066,var(--gold));
  cursor:pointer;
}
.message{margin-top:10px;min-height:24px;}

#chat{
  max-width:420px;
  margin:20px auto;
}
#onlineBox{
  border:1px solid gold;
  padding:6px;
  margin-bottom:8px;
  text-align:left;
}
#onlineUsers{
  margin:4px 0 0;
  padding-left:18px;
}
#messages{
  height:150px;
  overflow-y:auto;
  border:1px solid gold;
  padding:6px;
  text-align:left;
  margin-bottom:5px;
}
</style>
</head>

<body>
<header>
  <h1>🎰 VEGA$ ROYALE 🎰</h1>
</header>

<main>
<section class="machine">
  <div class="credits">Credits: $<span id="credits">100</span></div>

  <div class="reel-window">
    <div class="slots">
      <div class="slot"><img id="r1"></div>
      <div class="slot"><img id="r2"></div>
      <div class="slot"><img id="r3"></div>
    </div>
  </div>

  <label>Bet:</label>
  <select id="bet">
    <option value="5">$5</option>
    <option value="10" selected>$10</option>
    <option value="20">$20</option>
    <option value="50">$50</option>
  </select><br>

  <button id="spinBtn">SPIN</button>
  <div class="message" id="msg"></div>
</section>

<section id="chat">
  <div id="onlineBox">
    <div id="onlineCount">🟢 Online: 0</div>
    <ul id="onlineUsers"></ul>
  </div>

  <div id="messages"></div>
  <input id="chatInput" placeholder="Type message..." />
  <button id="sendBtn">Send</button>
</section>
</main>

<!-- Sounds -->
<audio id="spinSound" src="https://assets.mixkit.co/sfx/preview/mixkit-slot-machine-spin-1930.mp3"></audio>
<audio id="winSound" src="https://assets.mixkit.co/sfx/preview/mixkit-casino-win-1998.mp3"></audio>
<audio id="jackpotSound" src="https://assets.mixkit.co/sfx/preview/mixkit-arcade-game-jackpot-219.wav"></audio>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
/* 🎰 SLOT MACHINE */
const symbols=[
 {name:"cherry",img:"https://upload.wikimedia.org/wikipedia/commons/b/bb/Cherry_Icon.png"},
 {name:"bell",img:"https://upload.wikimedia.org/wikipedia/commons/3/3b/Bell_icon.png"},
 {name:"diamond",img:"https://upload.wikimedia.org/wikipedia/commons/5/5f/Diamond_icon.png"},
 {name:"star",img:"https://upload.wikimedia.org/wikipedia/commons/e/e5/Star_icon.png"}
];

let credits=100;
const r1=document.getElementById("r1");
const r2=document.getElementById("r2");
const r3=document.getElementById("r3");
const creditsSpan=document.getElementById("credits");
const betSelect=document.getElementById("bet");
const msg=document.getElementById("msg");

[r1,r2,r3].forEach(r=>r.src=symbols[Math.floor(Math.random()*symbols.length)].img);

function rand(){return symbols[Math.floor(Math.random()*symbols.length)];}
function update(){creditsSpan.textContent=credits;}

spinBtn.onclick=()=>{
 const bet=+betSelect.value;
 if(credits<bet){msg.textContent="❌ Not enough credits";return;}
 credits-=bet;update();
 spinSound.play();

 setTimeout(()=>{
  const a=rand(),b=rand(),c=rand();
  r1.src=a.img;r2.src=b.img;r3.src=c.img;
  spinSound.pause();

  if(a.name===b.name&&b.name===c.name){
    credits+=bet*6;
    jackpotSound.play();
    msg.textContent="🎉 JACKPOT!";
  }else if(a.name===b.name||b.name===c.name||a.name===c.name){
    credits+=bet*2;
    winSound.play();
    msg.textContent="✨ WIN!";
  }else msg.textContent="😢 No win";
  update();
 },800);
};

/* 🔥 FIREBASE – PASTE YOUR REAL CONFIG */
const firebaseConfig={
  apiKey:"PASTE_HERE",
  authDomain:"PASTE_HERE",
  databaseURL:"PASTE_HERE",
  projectId:"PASTE_HERE"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

/* 👤 USERNAME */
const username=prompt("Enter your name")||"Player";

/* 💬 CHAT */
const chatRef=db.ref("vegas-room");

sendBtn.onclick=()=>{
 if(!chatInput.value.trim())return;
 chatRef.push({user:username,text:chatInput.value,time:Date.now()});
 chatInput.value="";
};

chatRef.on("child_added",s=>{
 const d=s.val();
 const div=document.createElement("div");
 div.textContent=`${d.user}: ${d.text}`;
 messages.appendChild(div);
 messages.scrollTop=messages.scrollHeight;
});

/* 🟢 ONLINE USERS */
const presenceRef=db.ref("presence");
const myPresenceRef=presenceRef.push();

myPresenceRef.set({name:username,joined:Date.now()});
myPresenceRef.onDisconnect().remove();

presenceRef.on("value",snap=>{
 const users=snap.val()||{};
 onlineUsers.innerHTML="";
 const names=Object.values(users).map(u=>u.name);
 onlineCount.textContent="🟢 Online: "+names.length;

 names.forEach(n=>{
  const li=document.createElement("li");
  li.textContent=n;
  onlineUsers.appendChild(li);
 });
});
</script>
</body>
</html>
